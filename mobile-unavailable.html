<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Сайт временно недоступен</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .mobile-block { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px; text-align:center; }
    .mobile-block__card { background: #fff; padding:28px; border-radius:12px; max-width:520px; box-shadow:0 12px 30px rgba(10,10,10,0.12); }
    .mobile-block__title{ font-size:1.6rem; margin-bottom:12px; color: #222 }
    .mobile-block__text{ color:#444; margin-bottom:18px }
    .mobile-block__hint{ font-size:0.9rem; color:#666 }
  </style>
</head>
<body>
  <main class="mobile-block">
    <div class="mobile-block__card">
      <h1 class="mobile-block__title">Сайт временно недоступен на этом устройстве</h1>
      <p class="mobile-block__text">К сожалению, интерфейс сейчас оптимизирован только для компьютеров. Откройте сайт с рабочего стола для полноценной работы.</p>
      <p class="mobile-block__hint">Если у вас есть доступ к компьютеру, перейдите по адресу этого сайта или сохраните ссылку, чтобы продолжить позже.</p>
    </div>
  </main>
</body>
</html>
