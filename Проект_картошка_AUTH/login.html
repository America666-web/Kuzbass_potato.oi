<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
<div class="login-box">
  <div class="login-logo">Kuz<span class="logo__accent">Potato</span></div>
  <h2>Вход</h2>
  <input id="email" placeholder="логин">
  <input id="pass" type="password" placeholder="пароль">
  <button onclick="login()">Войти</button>
  <button onclick="register()">Регистрация</button>
</div>

<script>
async function login(){
  const email=document.getElementById('email').value;
  const password=document.getElementById('pass').value;

  if(!email || !password){
    alert('Заполните все поля');
    return;
  }

  try{
    const r=await fetch('http://localhost:3000/api/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password})
    });
    const d=await r.json();
    
    if(r.ok && d.email){
      localStorage.setItem('user',JSON.stringify(d));
      window.location='index.html';
    } else {
      alert('Ошибка: ' + (d.error || 'Неверные данные'));
    }
  }catch(e){
    alert('Ошибка подключения: ' + e.message);
  }
}

async function register(){
  const email=document.getElementById('email').value;
  const password=document.getElementById('pass').value;

  if(!email || !password){
    alert('Заполните все поля');
    return;
  }

  if(password.length < 3){
    alert('Пароль должен быть не менее 3 символов');
    return;
  }

  try{
    const r=await fetch('http://localhost:3000/api/register',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password})
    });
    const d=await r.json();
    
    if(r.ok){
      alert('Регистрация успешна! Теперь вы можете войти.');
      document.getElementById('email').value='';
      document.getElementById('pass').value='';
    } else {
      alert('Ошибка: ' + (d.error || 'Пользователь уже существует'));
    }
  }catch(e){
    alert('Ошибка подключения: ' + e.message);
  }
}
</script>
</body>
</html>
